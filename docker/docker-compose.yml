services:
  unidb-mcp:
    image: mikespook/unidb-mcp-server:latest
    ports:
      - "127.0.0.1:9093:9093"
    environment:
      - ADDR=0.0.0.0:9093
    volumes:
      # Persist UniDB configuration
      - unidb-data:/app/data
      # Mount host SQLite files (optional - for connecting to external SQLite DBs)
      # Example: - /path/on/host:/host-sqlite:ro
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "wget", "-q", "--spider", "http://localhost:9093/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Example sqlite-bridge sidecar — uncomment and configure as needed
  # sqlite-bridge:
  #   image: mikespook/unidb-sqlite-bridge:latest
  #   environment:
  #     - BRIDGE_NAME=mydb
  #     - BRIDGE_SECRET=your-secret
  #     - UNIDB_URL=http://unidb-mcp:9093
  #   volumes:
  #     - /path/to/your/database.db:/data/sqlite.db:ro
  #   depends_on:
  #     unidb-mcp:
  #       condition: service_healthy
  #   restart: unless-stopped

  # Example boltdb-bridge sidecar — uncomment and configure as needed
  # boltdb-bridge:
  #   image: mikespook/unidb-boltdb-bridge:latest
  #   environment:
  #     - BRIDGE_NAME=mydb
  #     - BRIDGE_SECRET=your-secret
  #     - UNIDB_URL=http://unidb-mcp:9093
  #   volumes:
  #     - /path/to/your/database.db:/data/boltdb.db:ro
  #   depends_on:
  #     unidb-mcp:
  #       condition: service_healthy
  #   restart: unless-stopped

volumes:
  unidb-data:
    driver: local
